<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 상하이 여행 가이드북 무료 증정</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; text-align: center; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; line-height: 1.4; }
        p { color: #666; font-size: 16px; margin-bottom: 30px; }
        .mockup { width: 200px; height: 280px; background: #eee; margin: 20px auto; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #999; border: 1px solid #ddd; }
        input[type="email"] { width: 80%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { background-color: #4285F4; color: white; border: none; padding: 12px 30px; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #357ae8; }
        footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇨🇳 2026 상하이 여행의 모든 것,<br>가이드북 하나로 끝내세요!</h1>
        <p>현지인이 알려주는 맛집부터 결제 꿀팁까지,<br>지금 이메일을 입력하고 PDF를 무료로 받으세요.</p>
        
        <div class="mockup">PDF Cover Preview</div>

        <form>
            <input type="email" placeholder="이메일 주소를 입력해 주세요" required>
            <br>
            <button type="submit">가이드북 지금 받기</button>
        </form>
        
        <footer>© 2026 Shanghai Travel Guide. All rights reserved. <br> <a href="#">개인정보 처리방침</a></footer>
    </div>
</body>
</html>
